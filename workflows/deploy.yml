name: 🚀 Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 👈 دیپلوی دستی از GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    
    steps:
      # ============================================
      # 📥 دریافت کد
      # ============================================
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ============================================
      # 📦 نصب Node.js
      # ============================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================
      # 📦 نصب وابستگی‌ها
      # ============================================
      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm install -g wrangler

      # ============================================
      # 🔍 لینت و بررسی کد
      # ============================================
      - name: 🔍 Lint & Check
        run: |
          npm run lint || echo "⚠️ Lint issues found but continuing..."
          npm run format || echo "⚠️ Format issues found but continuing..."

      # ============================================
      # 🚀 دیپلوی روی Cloudflare
      # ============================================
      - name: 🚀 Deploy to Cloudflare
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          MANAGER_ACCOUNTS: ${{ secrets.MANAGER_ACCOUNTS }}

      # ============================================
      # ✅ تایید دیپلوی
      # ============================================
      - name: ✅ Verify Deployment
        run: |
          echo "✅ سارا HYPER FUL با موفقیت دیپلوی شد!"
          echo "🌐 Worker URL: https://sara-self-bot.workers.dev"
          echo "📊 Check status: https://dash.cloudflare.com/?to=/:account/workers"

      # ============================================
      # 📊 ذخیره لاگ‌ها
      # ============================================
      - name: 📊 Save Deployment Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: |
            *.log
            .wrangler/
            wrangler.log
          retention-days: 7

  # ============================================
  # 🔍 دیپلوی روی محیط تست (اختیاری)
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy Staging
    needs: deploy
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline
          npm install -g wrangler

      - name: 🚀 Deploy to Staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.STAGING_BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

# ============================================
  # 🔔 اطلاع‌رسانی
  # ============================================
  notify:
    runs-on: ubuntu-latest
    name: Notify
    needs: [deploy]
    if: always()
    
    steps:
      - name: 📨 Send Notification to Telegram
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" == "success" ]; then
            MESSAGE="✅ سارا HYPER FUL با موفقیت دیپلوی شد! 🌸"
          else
            MESSAGE="❌ دیپلوی سارا HYPER FUL با خطا مواجه شد! 😢"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_IDS }}" \
            -d "text=$MESSAGE" || echo "⚠️ خطا در ارسال نوتیفیکیشن"
